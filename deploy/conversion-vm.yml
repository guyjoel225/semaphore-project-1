---
- name: test de conversion d une vm
  hosts:  localhost

  tasks:

    - name: lancer virt-v2v
      ansible.builtin.shell: |
        export LIBGUESTFS_BACKEND=direct
        LIBGUESTFS_DEBUG=1
        LIBGUESTFS_TRACE=1
        gather_facts: false
        sudo virt-v2v \
          -i vmx \
          -it ssh \
          "ssh://joel@192.168.222.1/home/joel/vmware/Attack/Attack.vmx" \
          -o local \
          -of qcow2 \
          -os /var/tmp/v1 \
          -v -x

      args:
        executable: /bin/bash
     
